# CLADA LLM Configuration
# Environment variables use ${VAR} syntax for safety.

providers:
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com

  openai:
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1

  ollama:
    base_url: http://localhost:11434

roles:
  executor:
    provider: anthropic
    model: claude-opus-4-7
    mode: cli
    cli_path: claude
    params:
      thinking_budget: 16000
      max_tokens: 32000

  verifier:
    provider: anthropic
    model: claude-sonnet-4-6
    mode: api
    params:
      temperature: 0.1
      max_tokens: 8000

  bootstrap_a:
    provider: anthropic
    model: claude-opus-4-7
    mode: api

  bootstrap_b:
    provider: anthropic
    model: claude-sonnet-4-6
    mode: api

defaults:
  temperature: 0.3
  max_tokens: 16000
